name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_dev: ${{ steps.version.outputs.is_dev }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          BASE_VERSION=$(node -p "require('./desktop/package.json').version")
          if [[ "${{ github.ref }}" == refs/heads/dev ]]; then
            SHORT_SHA="${GITHUB_SHA::7}"
            echo "version=${BASE_VERSION}-dev.${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_dev=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${BASE_VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_dev=false" >> "$GITHUB_OUTPUT"
          fi

  windows:
    needs: version
    uses: ./.github/workflows/desktop-build-platform.yml
    with:
      platform: windows
      os: windows-latest
      version: ${{ needs.version.outputs.version }}

  linux:
    needs: version
    uses: ./.github/workflows/desktop-build-platform.yml
    with:
      platform: linux
      os: ubuntu-latest
      version: ${{ needs.version.outputs.version }}

  macos:
    needs: version
    uses: ./.github/workflows/desktop-build-platform.yml
    with:
      platform: macos
      os: macos-latest
      version: ${{ needs.version.outputs.version }}
    secrets:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  release:
    needs: [version, windows, linux, macos]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create stable release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

      - name: Create dev pre-release
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Dev Build v${{ needs.version.outputs.version }}
          files: artifacts/**/*
          prerelease: true
          generate_release_notes: false
          body: |
            Development build from `dev` branch.
            Commit: ${{ github.sha }}
