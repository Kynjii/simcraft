name: Publish & Deploy

on:
  push:
    tags: ["v*"]
    branches: [dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.standalone
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old untagged images
        uses: actions/delete-package-versions@v5
        with:
          package-name: simcraft
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: true

  deploy-stable:
    needs: build-and-push
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy demo.simhammer.com
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/sortbek/simcraft:latest

            docker stop simhammer-demo 2>/dev/null || true
            docker rm simhammer-demo 2>/dev/null || true

            docker run -d --name simhammer-demo --restart unless-stopped \
              -p 8000:8000 \
              -v simhammer-data:/app/resources/data \
              -v simhammer-data-full:/app/resources/data_full \
              -v simhammer-simc:/app/resources/simc \
              -v simhammer-db:/app/db \
              ghcr.io/sortbek/simcraft:latest

            docker image prune -f

  deploy-dev:
    needs: build-and-push
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy dev.simhammer.com
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/sortbek/simcraft:dev

            docker stop simhammer-dev 2>/dev/null || true
            docker rm simhammer-dev 2>/dev/null || true

            docker run -d --name simhammer-dev --restart unless-stopped \
              -p 8001:8000 \
              -v simhammer-dev-data:/app/resources/data \
              -v simhammer-dev-data-full:/app/resources/data_full \
              -v simhammer-dev-simc:/app/resources/simc \
              -v simhammer-dev-db:/app/db \
              ghcr.io/sortbek/simcraft:dev

            docker image prune -f
